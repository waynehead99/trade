services:
  congress-trader:
    # Prebuilt image published by .github/workflows/docker.yml on every push to main.
    # For local dev you can build instead by running:
    #   docker compose build
    # which will use the Dockerfile in this directory (the `build:` block below).
    image: ghcr.io/waynehead99/trade:latest
    build: .
    container_name: congress-trader
    restart: unless-stopped
    pull_policy: always

    # Secrets resolved via variable substitution. Set these either in a local
    # .env alongside this file (docker compose picks it up automatically) or
    # in Portainer's stack "Environment variables" UI for git-based deploys.
    environment:
      ALPACA_API_KEY: ${ALPACA_API_KEY}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY}
      PROD_ALPACA_API_KEY: ${PROD_ALPACA_API_KEY:-}
      PROD_ALPACA_SECRET_KEY: ${PROD_ALPACA_SECRET_KEY:-}
      ALPACA_PAPER: ${ALPACA_PAPER:-true}
      DB_PATH: /data/trades.db
      HOST: 0.0.0.0
      PORT: "5000"
      TZ: America/New_York

    # Persist the SQLite trade cache across container rebuilds.
    volumes:
      - trades_data:/data

    # Published so Traefik (running on a different host) can reach it over the
    # LAN. The UI itself has no auth — rely on Traefik + Authentik forward-auth
    # to gate access, and restrict port 5000 at the firewall to your Traefik
    # host's IP only. Otherwise anyone on your LAN hitting port 5000 directly
    # bypasses authentication.
    ports:
      - "5000:5000"

volumes:
  trades_data:
