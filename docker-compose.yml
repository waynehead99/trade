services:
  congress-trader:
    build: .
    image: congress-trader:latest
    container_name: congress-trader
    restart: unless-stopped

    # Secrets resolved via variable substitution. Set these either in a local
    # .env alongside this file (docker compose picks it up automatically) or
    # in Portainer's stack "Environment variables" UI for git-based deploys.
    environment:
      ALPACA_API_KEY: ${ALPACA_API_KEY}
      ALPACA_SECRET_KEY: ${ALPACA_SECRET_KEY}
      PROD_ALPACA_API_KEY: ${PROD_ALPACA_API_KEY:-}
      PROD_ALPACA_SECRET_KEY: ${PROD_ALPACA_SECRET_KEY:-}
      ALPACA_PAPER: ${ALPACA_PAPER:-true}
      DB_PATH: /data/trades.db
      HOST: 0.0.0.0
      PORT: "5000"
      TZ: America/New_York

    # Persist the SQLite trade cache across container rebuilds.
    volumes:
      - trades_data:/data

    # No host port mapping — the UI is only reachable via Traefik + Authentik
    # forward-auth on the shared network below. For local dev without Traefik,
    # uncomment this (binds to localhost on the host only):
    # ports:
    #   - "127.0.0.1:5000:5000"

    networks:
      - traefik

    labels:
      traefik.enable: "true"
      # Tell Traefik which network to use when it reaches this container.
      traefik.docker.network: traefik

      # --- Router ---
      # Change trader.example.com to your actual hostname.
      traefik.http.routers.congress-trader.rule: "Host(`trader.eriksononline.com`)"
      traefik.http.routers.congress-trader.entrypoints: "websecure"
      traefik.http.routers.congress-trader.tls: "true"
      # Match the cert resolver name configured in your Traefik static config.
      traefik.http.routers.congress-trader.tls.certresolver: "letsencrypt"

      # --- Authentik forward-auth middleware ---
      # Middleware reference format is <name>@<provider>. If your Authentik
      # middleware is defined in a Traefik file provider it's typically
      # "authentik@file"; if defined on the authentik-proxy container via
      # Docker labels it's "authentik@docker". Adjust to match your setup.
      traefik.http.routers.congress-trader.middlewares: "authentik@file"

      # --- Service ---
      traefik.http.services.congress-trader.loadbalancer.server.port: "5000"

networks:
  # Shared network for Traefik + Authentik outpost + this service.
  # This stack will create the network on first deploy. If your Traefik stack
  # already owns a proxy network, switch to:
  #   external: true
  #   name: <your-traefik-network-name>
  # and remove the `name:` line below.
  traefik:
    name: traefik

volumes:
  trades_data:
